<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#FAF5EF">
<link rel="manifest" href="manifest.json">
<title>日常记录</title>
<style>
:root {
  --bg: #FAF5EF;
  --card: #F5EDE3;
  --accent: #C27A5A;
  --accent2: #8FA88F;
  --text: #4A3728;
  --muted: #9B8E84;
  --danger: #C27A5A;
  --radius: 14px;
  --shadow: 0 2px 12px rgba(74,55,40,.06);
  --nav-h: 62px;
  --input-h: 52px;
  --safe-b: env(safe-area-inset-bottom, 0px);
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:var(--bg);color:var(--text);
  -webkit-tap-highlight-color:transparent;
  -webkit-font-smoothing:antialiased;
  overscroll-behavior:none;
  overflow:hidden;
  height:100vh;height:100dvh;
}
#app{height:100%;display:flex;flex-direction:column;max-width:480px;margin:0 auto;position:relative}
.page{display:none;flex-direction:column;flex:1;overflow:hidden}
.page.active{display:flex}
.header{padding:20px 20px 8px;flex-shrink:0}
.header h1{font-size:22px;font-weight:700;letter-spacing:-.3px}
.header .sub{font-size:13px;color:var(--muted);margin-top:2px}
.content{flex:1;overflow-y:auto;padding:0 16px 12px;-webkit-overflow-scrolling:touch}
.content::-webkit-scrollbar{width:0}

/* Cards */
.card{background:var(--card);border-radius:var(--radius);padding:16px;margin-bottom:10px;box-shadow:var(--shadow)}
.card-row{display:flex;gap:10px}
.card-row .card{flex:1}

/* Buttons */
.btn{
  display:inline-flex;align-items:center;justify-content:center;
  padding:10px 20px;border-radius:24px;border:none;font-size:15px;
  font-weight:600;cursor:pointer;transition:opacity .15s;
  -webkit-tap-highlight-color:transparent;
}
.btn:active{opacity:.7}
.btn-accent{background:var(--accent);color:#fff}
.btn-outline{background:transparent;color:var(--accent);border:1.5px solid var(--accent)}
.btn-sm{padding:6px 14px;font-size:13px;border-radius:16px}

/* Inputs */
.input{
  width:100%;padding:12px 16px;border-radius:24px;border:1.5px solid transparent;
  background:var(--card);font-size:15px;color:var(--text);outline:none;
  transition:border-color .2s;
}
.input:focus{border-color:var(--accent)}
.input::placeholder{color:var(--muted)}

/* Bottom bar */
.bottom-bar{
  flex-shrink:0;background:var(--bg);border-top:1px solid rgba(74,55,40,.06);
  padding-bottom:var(--safe-b);
}
.input-row{display:flex;gap:8px;padding:10px 16px;align-items:center}

/* Tab bar */
.tab-bar{
  display:flex;justify-content:space-around;height:var(--nav-h);
  padding:0 8px;
}
.tab{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;flex:1;cursor:pointer;color:var(--muted);transition:color .2s;
  -webkit-tap-highlight-color:transparent;user-select:none;
}
.tab.active{color:var(--accent)}
.tab .icon{font-size:22px;line-height:1}
.tab .label{font-size:10px;font-weight:500}

/* Finance */
.amount-card{text-align:center;padding:20px}
.amount-card .label{font-size:12px;color:var(--muted)}
.amount-card .value{font-size:32px;font-weight:800;letter-spacing:-1px;margin:4px 0}
.amount-card .value.income{color:var(--accent2)}
.amount-card .value.expense{color:var(--accent)}
.cat-chip{
  display:inline-flex;padding:6px 12px;border-radius:16px;font-size:12px;
  cursor:pointer;background:transparent;color:var(--muted);border:1px solid var(--muted);
  transition:all .15s;white-space:nowrap;
}
.cat-chip.selected{background:var(--accent);color:#fff;border-color:var(--accent)}
.cat-list{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.record-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid rgba(74,55,40,.04)}
.record-item .info{flex:1}
.record-item .cat{font-size:11px;color:var(--muted);margin-top:2px}
.record-item .amount{font-size:17px;font-weight:700}
.record-item .amount.expense{color:var(--accent)}
.record-item .amount.income{color:var(--accent2)}
.date-group{margin-top:14px}
.date-group .date-label{font-size:12px;color:var(--muted);margin-bottom:4px;font-weight:600}

/* Thought */
.thought-item{padding:14px 0;border-bottom:1px solid rgba(74,55,40,.04)}
.thought-item .time{font-size:11px;color:var(--muted);margin-bottom:4px}
.thought-item .text{font-size:15px;line-height:1.6;white-space:pre-wrap}
.thought-item .imgs{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.thought-item .imgs img{width:80px;height:80px;object-fit:cover;border-radius:10px;cursor:pointer}

/* Body log */
.body-card{text-align:center}
.body-card .big-num{font-size:36px;font-weight:800;letter-spacing:-1px}
.body-card .unit{font-size:14px;color:var(--muted)}
.progress-ring{width:80px;height:80px;margin:8px auto}
.water-btn{width:56px;height:56px;border-radius:50%;background:var(--accent);color:#fff;font-size:28px;border:none;cursor:pointer;display:inline-flex;align-items:center;justify-content:center}
.water-btn:active{opacity:.7}
.meal-item{padding:10px 0;border-bottom:1px solid rgba(74,55,40,.04)}
.meal-item .meal-tag{font-size:10px;padding:2px 8px;border-radius:8px;display:inline-block;margin-right:8px}
.meal-tag.breakfast{background:#F5EDE3;color:var(--accent)}
.meal-tag.lunch{background:#F5EDE3;color:var(--accent2)}
.meal-tag.dinner{background:#F5EDE3;color:var(--accent)}
.meal-tag.snack{background:#F5EDE3;color:var(--muted)}

/* Profile */
.stat-row{display:flex;gap:10px;margin-bottom:10px}
.stat-card{flex:1;text-align:center;padding:16px 8px}
.stat-card .num{font-size:28px;font-weight:800}
.stat-card .lbl{font-size:11px;color:var(--muted);margin-top:2px}
.menu-item{padding:14px 0;border-bottom:1px solid rgba(74,55,40,.04);font-size:15px;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.menu-item:active{opacity:.7}
.menu-item .arrow{color:var(--muted)}

/* Overlay */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;justify-content:center;align-items:center}
.overlay.show{display:flex}
.dialog{background:var(--bg);border-radius:18px;padding:24px;width:90%;max-width:360px;text-align:center}
.dialog h3{margin-bottom:8px}
.dialog p{font-size:14px;color:var(--muted);margin-bottom:16px}
.dialog .btns{display:flex;gap:8px;justify-content:center}

/* Toast */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);padding:10px 24px;border-radius:20px;font-size:14px;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}

/* Image preview */
.img-full{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:150;display:none;justify-content:center;align-items:center;cursor:pointer}
.img-full.show{display:flex}
.img-full img{max-width:95%;max-height:90%;border-radius:8px}

/* Textarea */
.input-row textarea.input{resize:none;min-height:36px;max-height:80px;font-family:inherit;line-height:1.4}
.img-pending{display:inline-flex;align-items:center;gap:4px;position:relative;margin-left:4px;flex-shrink:0}
.img-pending img{width:32px;height:32px;object-fit:cover;border-radius:8px}
.img-pending .remove{position:absolute;top:-6px;right:-6px;width:18px;height:18px;border-radius:50%;background:var(--danger);color:#fff;font-size:10px;line-height:18px;text-align:center;cursor:pointer}

/* History charts */
.hist-toggle{font-size:12px;color:var(--accent);cursor:pointer;margin-top:10px;user-select:none}
.hist-toggle:active{opacity:.7}
.chart-wrap{padding-top:8px}
.chart-row{display:flex;align-items:center;gap:6px;margin:3px 0;font-size:11px}
.chart-date{width:38px;text-align:right;color:var(--muted);flex-shrink:0}
.chart-bar-wrap{flex:1;height:14px;background:rgba(74,55,40,.05);border-radius:7px;overflow:hidden}
.chart-bar{height:100%;border-radius:7px;min-width:2px;transition:width .4s}
.chart-bar.sleep-bar{background:linear-gradient(90deg,#C27A5A,#D4956E)}
.chart-bar.water-bar{background:linear-gradient(90deg,#7BA4B5,#8FB8C8)}
.chart-val{width:42px;font-size:11px;color:var(--muted);flex-shrink:0}
</style>
</head>
<body>
<div id="app"></div>
<div class="toast" id="toast"></div>
<div class="overlay" id="overlay"><div class="dialog" id="dialog"></div></div>
<div class="img-full" id="imgFull" onclick="this.classList.remove('show')"><img id="imgFullImg" src=""></div>
<script>
// ============ STORAGE ============
const DB = {
  key:'daily_tracker_v1',
  read(){try{return JSON.parse(localStorage.getItem(this.key))||this.default()}catch(e){return this.default()}},
  write(d){localStorage.setItem(this.key,JSON.stringify(d))},
  default(){return{finance:[],thoughts:[],body:{sleep:[],water:{},meals:[]}}}
};

// IndexedDB for images
const IMG = {
  _db:null,
  async db(){
    if(this._db)return this._db;
    return new Promise((res,rej)=>{
      const r=indexedDB.open('tracker_imgs',1);
      r.onupgradeneeded=()=>{r.result.createObjectStore('imgs',{keyPath:'id'})};
      r.onsuccess=()=>{this._db=r.result;res(this._db)};
      r.onerror=rej;
    })
  },
  async save(id,blob){
    const db=await this.db();
    return new Promise((res,rej)=>{
      const t=db.transaction('imgs','readwrite');
      t.objectStore('imgs').put({id,data:blob,ts:Date.now()});
      t.oncomplete=()=>res();
      t.onerror=rej;
    })
  },
  async get(id){
    const db=await this.db();
    return new Promise((res,rej)=>{
      const t=db.transaction('imgs','readonly');
      const r=t.objectStore('imgs').get(id);
      r.onsuccess=()=>res(r.result?.data||null);
      r.onerror=rej;
    })
  },
  async remove(id){
    const db=await this.db();
    return new Promise((res,rej)=>{
      const t=db.transaction('imgs','readwrite');
      t.objectStore('imgs').delete(id);
      t.oncomplete=()=>res();
      t.onerror=rej;
    })
  },
  async getAllIds(){
    const db=await this.db();
    return new Promise((res,rej)=>{
      const t=db.transaction('imgs','readonly');
      const r=t.objectStore('imgs').getAllKeys();
      r.onsuccess=()=>res(r.result);
      r.onerror=rej;
    })
  }
};

// ============ STATE ============
let data=DB.read();
let activeTab='finance';
let financeCat='expense';
let financeCatType='餐饮';
let bodySubTab='sleep';
let sleepHistOpen=false;
let waterHistOpen=false;
let pendingThoughtFile=null;
let pendingMealFile=null;

const cats=['餐饮','交通','购物','娱乐','日用','其他'];
const meals=['breakfast','lunch','dinner','snack'];
const mealLabels={breakfast:'早餐',lunch:'午餐',dinner:'晚餐',snack:'零食'};

function save(){DB.write(data)}

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,8)}

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),1800);
}

function fmtDate(ts){
  const d=new Date(ts);
  const now=new Date();
  if(d.toDateString()===now.toDateString())return '今天';
  const y=new Date(now);y.setDate(y.getDate()-1);
  if(d.toDateString()===y.toDateString())return '昨天';
  return `${d.getMonth()+1}月${d.getDate()}日`;
}

function fmtTime(ts){const d=new Date(ts);return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`}

function fmtFullDate(ts){const d=new Date(ts);return `${d.getMonth()+1}/${d.getDate()}`}

// ============ RENDER ============
function render(){
  const app=document.getElementById('app');
  app.innerHTML=
    renderPage('finance','💰','记账',renderFinance())+
    renderPage('thoughts','💭','想法',renderThoughts())+
    renderPage('body','🌿','身体',renderBody())+
    renderPage('me','👤','我',renderMe())+
    `<div class="bottom-bar">
      <div class="input-row">${renderInputRow()}</div>
      <div class="tab-bar">
        ${['finance','thoughts','body','me'].map(t=>`
          <div class="tab${activeTab===t?' active':''}" data-tab="${t}">
            <span class="icon">${t==='finance'?'💰':t==='thoughts'?'💭':t==='body'?'🌿':'👤'}</span>
            <span class="label">${t==='finance'?'记账':t==='thoughts'?'想法':t==='body'?'身体':'我'}</span>
          </div>
        `).join('')}
      </div>
    </div>`;
  bindTabs();
  bindInput();
  bindMeActions();
}

function renderPage(id,icon,title,body){
  return `<div class="page${activeTab===id?' active':''}" id="page-${id}">
    <div class="header"><h1>${title}</h1>${id==='finance'?'<div class="sub">本月收支</div>':id==='body'?'<div class="sub">今日记录</div>':''}</div>
    <div class="content" id="content-${id}">${body}</div>
  </div>`;
}

// ---- Finance ----
function renderFinance(){
  const now=new Date();
  const m=now.getMonth(),y=now.getFullYear();
  const monthRecs=data.finance.filter(r=>{
    const d=new Date(r.ts);return d.getMonth()===m&&d.getFullYear()===y;
  });
  const totalExp=monthRecs.filter(r=>r.type==='expense').reduce((s,r)=>s+r.amount,0);
  const totalInc=monthRecs.filter(r=>r.type==='income').reduce((s,r)=>s+r.amount,0);

  const grouped={};
  [...data.finance].reverse().forEach(r=>{
    const k=fmtDate(r.ts);
    if(!grouped[k])grouped[k]=[];
    grouped[k].push(r);
  });

  let list='';
  for(const [date,items]of Object.entries(grouped)){
    list+=`<div class="date-group"><div class="date-label">${date}</div>`;
    items.forEach(r=>{
      list+=`<div class="record-item">
        <div class="info">
          <div style="font-size:14px">${r.note||r.cat}</div>
          <div class="cat">${r.cat} · ${fmtTime(r.ts)}</div>
        </div>
        <div class="amount ${r.type}">${r.type==='expense'?'-':'+'}¥${r.amount.toFixed(2)}</div>
      </div>`;
    });
    list+='</div>';
  }

  return `
    <div class="card-row">
      <div class="card amount-card"><div class="label">本月支出</div><div class="value expense">¥${totalExp.toFixed(2)}</div></div>
      <div class="card amount-card"><div class="label">本月收入</div><div class="value income">¥${totalInc.toFixed(2)}</div></div>
    </div>
    <div class="cat-list">
      ${cats.map(c=>`<span class="cat-chip${financeCatType===c?' selected':''}" data-cat="${c}">${c}</span>`).join('')}
    </div>
    ${list||'<div style="text-align:center;color:var(--muted);padding:40px 0">还没有记录<br>在下方输入金额和备注开始记账吧</div>'}
  `;
}

// ---- Thoughts ----
function renderThoughts(){
  if(!data.thoughts.length)return '<div style="text-align:center;color:var(--muted);padding:40px 0">还没有想法<br>记录你的第一个想法吧</div>';
  return [...data.thoughts].reverse().map(t=>`
    <div class="thought-item">
      <div class="time">${fmtDate(t.ts)} ${fmtTime(t.ts)}</div>
      <div class="text">${escHtml(t.text)}</div>
      ${t.imgIds?.length?`<div class="imgs">${t.imgIds.map(id=>`<img src="" data-img="${id}" onclick="loadImg(this,'${id}')" alt="">`).join('')}</div>`:''}
      <div style="text-align:right;margin-top:4px"><span style="font-size:11px;color:var(--muted);cursor:pointer" data-del-thought="${t.id}">删除</span></div>
    </div>
  `).join('');
}

// ---- Body ----
function renderBody(){
  const today=new Date().toDateString();
  const todayWater=data.body.water[today]||0;
  const todaySleep=data.body.sleep.filter(s=>new Date(s.ts).toDateString()===today);
  const todayMeals=data.body.meals.filter(m=>new Date(m.ts).toDateString()===today);
  const waterPct=Math.min(100,Math.round(todayWater/2000*100));

  let sleepHtml='';
  todaySleep.forEach(s=>{
    sleepHtml+=`<div style="font-size:13px;margin-top:4px">${s.hours}h · ${s.quality} · ${fmtTime(s.ts)} <span style="color:var(--muted);cursor:pointer;font-size:11px" data-del-sleep="${s.id}">删</span></div>`;
  });

  // Sleep history chart
  let sleepHistHtml='';
  const recentSleep=getRecentSleep();
  if(recentSleep.length>1){
    const maxH=Math.max(...recentSleep.map(s=>s.hours),1);
    sleepHistHtml=`
      <div class="hist-toggle" id="sleepHistToggle">${sleepHistOpen?'收起':'展开'}近期睡眠统计 ▾</div>
      <div class="chart-wrap" id="sleepChart" style="${sleepHistOpen?'':'display:none'}">
        ${recentSleep.map(s=>`
          <div class="chart-row">
            <span class="chart-date">${s.label}</span>
            <span class="chart-bar-wrap"><span class="chart-bar sleep-bar" style="width:${(s.hours/maxH*100)}%"></span></span>
            <span class="chart-val">${s.hours}h</span>
          </div>
        `).join('')}
      </div>`;
  }

  // Water history chart
  let waterHistHtml='';
  const recentWater=getRecentWater();
  if(recentWater.length>1){
    const maxW=Math.max(...recentWater.map(w=>w.ml),1);
    waterHistHtml=`
      <div class="hist-toggle" id="waterHistToggle">${waterHistOpen?'收起':'展开'}近期喝水统计 ▾</div>
      <div class="chart-wrap" id="waterChart" style="${waterHistOpen?'':'display:none'}">
        ${recentWater.map(w=>`
          <div class="chart-row">
            <span class="chart-date">${w.label}</span>
            <span class="chart-bar-wrap"><span class="chart-bar water-bar" style="width:${(w.ml/maxW*100)}%"></span></span>
            <span class="chart-val">${w.ml}ml</span>
          </div>
        `).join('')}
      </div>`;
  }

  let mealHtml='';
  const mealGrouped={};
  todayMeals.forEach(m=>{if(!mealGrouped[m.meal])mealGrouped[m.meal]=[];mealGrouped[m.meal].push(m)});
  for(const [meal,items]of Object.entries(mealGrouped)){
    items.forEach(m=>{
      mealHtml+=`<div class="meal-item">
        <span class="meal-tag ${m.meal}">${mealLabels[m.meal]}</span>
        <span style="font-size:14px">${escHtml(m.text)}</span>
        ${m.imgId?` <img src="" data-img="${m.imgId}" onclick="loadImg(this,'${m.imgId}')" style="width:36px;height:36px;object-fit:cover;border-radius:8px;vertical-align:middle;cursor:pointer" alt="">`:''}
        <span style="float:right;font-size:11px;color:var(--muted)">${fmtTime(m.ts)}</span>
      </div>`;
    });
  }

  return `
    <div class="card body-card">
      <div style="font-weight:600;margin-bottom:8px">😴 睡眠</div>
      <div class="big-num">${todaySleep.length?todaySleep[todaySleep.length-1].hours+'h':'--'}</div>
      ${sleepHtml||'<div style="font-size:13px;color:var(--muted)">今天还没记录</div>'}
      ${sleepHistHtml}
    </div>
    <div class="card body-card">
      <div style="font-weight:600;margin-bottom:8px">💧 喝水</div>
      <div class="big-num">${todayWater}<span class="unit">ml</span></div>
      <div style="font-size:12px;color:var(--muted);margin:4px 0">目标 2000ml · ${waterPct}%</div>
      <div style="margin-top:8px">
        <button class="water-btn" id="waterAdd">+</button>
      </div>
      ${waterHistHtml}
    </div>
    <div class="card">
      <div style="font-weight:600;margin-bottom:8px">🍽️ 饮食</div>
      ${mealHtml||'<div style="font-size:13px;color:var(--muted);text-align:center;padding:12px 0">今天还没记录</div>'}
    </div>
  `;
}

function getRecentSleep(){
  const days=[];
  for(let i=6;i>=0;i--){
    const d=new Date();d.setDate(d.getDate()-i);
    const ds=d.toDateString();
    const recs=data.body.sleep.filter(s=>new Date(s.ts).toDateString()===ds);
    if(recs.length){
      const latest=recs[recs.length-1];
      days.push({label:fmtFullDate(d.getTime()),hours:latest.hours});
    }
  }
  return days;
}

function getRecentWater(){
  const days=[];
  for(let i=6;i>=0;i--){
    const d=new Date();d.setDate(d.getDate()-i);
    const ds=d.toDateString();
    const ml=data.body.water[ds]||0;
    days.push({label:fmtFullDate(d.getTime()),ml});
  }
  return days;
}

// ---- Me ----
function renderMe(){
  const totalRecs=data.finance.length+data.thoughts.length+data.body.sleep.length+data.body.meals.length;
  const now=new Date();const m=now.getMonth(),y=now.getFullYear();
  const monthExp=data.finance.filter(r=>{const d=new Date(r.ts);return d.getMonth()===m&&d.getFullYear()===y&&r.type==='expense'}).reduce((s,r)=>s+r.amount,0);
  return `
    <div class="stat-row">
      <div class="card stat-card"><div class="num">${totalRecs}</div><div class="lbl">总记录</div></div>
      <div class="card stat-card"><div class="num">${data.finance.length}</div><div class="lbl">记账笔数</div></div>
      <div class="card stat-card"><div class="num">${data.thoughts.length}</div><div class="lbl">想法</div></div>
    </div>
    <div class="card stat-card"><div class="num" style="color:var(--accent)">¥${monthExp.toFixed(2)}</div><div class="lbl">本月支出</div></div>
    <div style="margin-top:16px">
      <div class="menu-item" data-action="export-csv"><span>📊 导出 Excel (CSV)</span><span class="arrow">›</span></div>
      <div class="menu-item" data-action="export-json"><span>📤 导出备份 (JSON)</span><span class="arrow">›</span></div>
      <div class="menu-item" data-action="import"><span>📥 导入备份</span><span class="arrow">›</span></div>
      <div class="menu-item" data-action="clear"><span>🗑️ 清除所有数据</span><span class="arrow">›</span></div>
    </div>
    <div style="text-align:center;color:var(--muted);font-size:12px;margin-top:20px">数据仅储存在此设备<br>不会上传到任何服务器</div>
  `;
}

// ---- Input Row ----
function renderInputRow(){
  switch(activeTab){
    case 'finance':return `
      <button class="btn btn-sm btn-outline" id="finTypeBtn">${financeCat==='expense'?'支出':'收入'}</button>
      <input class="input" id="finAmount" type="number" placeholder="金额" style="width:80px;text-align:center" inputmode="decimal">
      <input class="input" id="finNote" placeholder="备注（可选）" style="flex:1">
    `;
    case 'thoughts':return `
      <textarea class="input" id="thoughtInput" placeholder="记录想法...&#10;支持换行，可以同时发文字和图片" style="flex:1;height:36px" rows="1"></textarea>
      ${pendingThoughtFile?`<span class="img-pending"><img src="${URL.createObjectURL(pendingThoughtFile)}" alt=""><span class="remove" id="thoughtImgRemove">×</span></span>`:''}
      <button class="btn btn-sm btn-outline" id="thoughtImgBtn">📷</button>
      <input type="file" id="thoughtImgFile" accept="image/*" style="display:none">
      <button class="btn btn-sm btn-accent" id="thoughtSend">发送</button>
    `;
    case 'body':return renderBodyInput();
    default:return '';
  }
}

function renderBodyInput(){
  if(bodySubTab==='sleep')return `
    <input class="input" id="sleepHr" type="number" placeholder="小时" style="width:70px;text-align:center" inputmode="decimal" step="0.5" min="0" max="24">
    <select id="sleepQuality" style="padding:8px 12px;border-radius:16px;border:1.5px solid var(--muted);background:transparent;font-size:13px;color:var(--text)">
      <option value="好">好</option><option value="一般">一般</option><option value="差">差</option>
    </select>
    <button class="btn btn-sm btn-accent" id="sleepSave">保存</button>
    <div style="display:flex;gap:6px;margin-left:auto">
      <button class="btn btn-sm btn-outline" data-bodysub="water" style="font-size:11px">💧</button>
      <button class="btn btn-sm btn-outline" data-bodysub="meal" style="font-size:11px">🍽️</button>
    </div>`;
  if(bodySubTab==='water')return `
    <span style="font-size:13px;color:var(--muted);padding:0 8px">点击下方 + 号记录 200ml</span>
    <div style="display:flex;gap:6px;margin-left:auto">
      <button class="btn btn-sm btn-outline" data-bodysub="sleep" style="font-size:11px">😴</button>
      <button class="btn btn-sm btn-outline" data-bodysub="meal" style="font-size:11px">🍽️</button>
    </div>`;
  if(bodySubTab==='meal')return `
    <select id="mealType" style="padding:8px 12px;border-radius:16px;border:1.5px solid var(--muted);background:transparent;font-size:13px;color:var(--text)">
      ${meals.map(m=>`<option value="${m}">${mealLabels[m]}</option>`).join('')}
    </select>
    <textarea class="input" id="mealText" placeholder="吃了什么..." style="flex:1;height:36px" rows="1"></textarea>
    ${pendingMealFile?`<span class="img-pending"><img src="${URL.createObjectURL(pendingMealFile)}" alt=""><span class="remove" id="mealImgRemove">×</span></span>`:''}
    <button class="btn btn-sm btn-outline" id="mealImgBtn">📷</button>
    <input type="file" id="mealImgFile" accept="image/*" style="display:none">
    <button class="btn btn-sm btn-accent" id="mealSend">保存</button>
    <div style="display:flex;gap:6px;margin-left:auto">
      <button class="btn btn-sm btn-outline" data-bodysub="sleep" style="font-size:11px">😴</button>
      <button class="btn btn-sm btn-outline" data-bodysub="water" style="font-size:11px">💧</button>
    </div>`;
}

// ============ BINDINGS ============
function bindTabs(){
  document.querySelectorAll('.tab').forEach(t=>{
    t.onclick=()=>{
      activeTab=t.dataset.tab;
      if(activeTab==='body')bodySubTab='sleep';
      sleepHistOpen=false;waterHistOpen=false;
      pendingThoughtFile=null;pendingMealFile=null;
      render();
    };
  });
  document.querySelectorAll('[data-bodysub]').forEach(b=>{
    b.onclick=()=>{bodySubTab=b.dataset.bodysub;render();};
  });
}

function bindInput(){
  // Finance
  const finTypeBtn=document.getElementById('finTypeBtn');
  if(finTypeBtn)finTypeBtn.onclick=()=>{
    financeCat=financeCat==='expense'?'income':'expense';
    render();
  };
  const finAmount=document.getElementById('finAmount');
  const finNote=document.getElementById('finNote');
  if(finAmount&&finNote){
    const addFinance=()=>{
      const amt=parseFloat(finAmount.value);
      if(!amt||amt<=0){toast('请输入金额');return}
      const note=finNote.value.trim();
      data.finance.push({id:uid(),type:financeCat,amount:amt,cat:financeCatType,note:note||financeCatType,ts:Date.now()});
      save();render();
    };
    finAmount.onkeydown=e=>{if(e.key==='Enter')addFinance();};
    finNote.onkeydown=e=>{if(e.key==='Enter')addFinance();};
  }
  // Cat chips
  document.querySelectorAll('.cat-chip').forEach(c=>{
    c.onclick=()=>{financeCatType=c.dataset.cat;render();};
  });

  // Thoughts
  const thoughtInput=document.getElementById('thoughtInput');
  const thoughtSend=document.getElementById('thoughtSend');
  async function submitThought(){
    const text=thoughtInput.value.trim();
    const file=pendingThoughtFile;
    if(!text&&!file){toast('请输入内容或添加图片');return}
    const finalText=text||(file?'分享了一张图片':'');
    await saveThought(finalText,file);
    thoughtInput.value='';
    pendingThoughtFile=null;
    render();
  }
  if(thoughtInput){
    thoughtInput.onkeydown=e=>{
      if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();submitThought();}
    };
  }
  if(thoughtSend)thoughtSend.onclick=submitThought;
  const thoughtImgBtn=document.getElementById('thoughtImgBtn');
  const thoughtImgFile=document.getElementById('thoughtImgFile');
  if(thoughtImgBtn&&thoughtImgFile){
    thoughtImgBtn.onclick=()=>thoughtImgFile.click();
    thoughtImgFile.onchange=()=>{
      const f=thoughtImgFile.files[0];if(!f)return;
      if(pendingThoughtFile)URL.revokeObjectURL(pendingThoughtFile);
      pendingThoughtFile=f;
      thoughtImgFile.value='';
      render();
    };
  }
  const thoughtImgRemove=document.getElementById('thoughtImgRemove');
  if(thoughtImgRemove){
    thoughtImgRemove.onclick=e=>{
      e.stopPropagation();
      if(pendingThoughtFile)URL.revokeObjectURL(pendingThoughtFile);
      pendingThoughtFile=null;
      render();
    };
  }

  // Sleep
  const sleepSave=document.getElementById('sleepSave');
  if(sleepSave){
    sleepSave.onclick=()=>{
      const hr=parseFloat(document.getElementById('sleepHr').value);
      if(!hr||hr<=0){toast('请输入睡眠时长');return}
      const q=document.getElementById('sleepQuality').value;
      data.body.sleep.push({id:uid(),hours:hr,quality:q,ts:Date.now()});
      save();render();
    };
  }

  // Sleep history toggle
  const sleepHistToggle=document.getElementById('sleepHistToggle');
  if(sleepHistToggle){
    sleepHistToggle.onclick=()=>{sleepHistOpen=!sleepHistOpen;render();};
  }

  // Water
  const waterAdd=document.getElementById('waterAdd');
  if(waterAdd){
    waterAdd.onclick=()=>{
      const today=new Date().toDateString();
      data.body.water[today]=(data.body.water[today]||0)+200;
      save();render();
    };
  }

  // Water history toggle
  const waterHistToggle=document.getElementById('waterHistToggle');
  if(waterHistToggle){
    waterHistToggle.onclick=()=>{waterHistOpen=!waterHistOpen;render();};
  }

  // Meal
  const mealText=document.getElementById('mealText');
  const mealSend=document.getElementById('mealSend');
  async function submitMeal(){
    const text=mealText.value.trim();
    const file=pendingMealFile;
    if(!text&&!file){toast('请输入内容或添加图片');return}
    const finalText=text||(file?'一顿美食':'');
    await saveMeal(finalText,file);
    mealText.value='';
    pendingMealFile=null;
    render();
  }
  if(mealText){
    mealText.onkeydown=e=>{
      if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();submitMeal();}
    };
  }
  if(mealSend)mealSend.onclick=submitMeal;
  const mealImgBtn=document.getElementById('mealImgBtn');
  const mealImgFile=document.getElementById('mealImgFile');
  if(mealImgBtn&&mealImgFile){
    mealImgBtn.onclick=()=>mealImgFile.click();
    mealImgFile.onchange=()=>{
      const f=mealImgFile.files[0];if(!f)return;
      if(pendingMealFile)URL.revokeObjectURL(pendingMealFile);
      pendingMealFile=f;
      mealImgFile.value='';
      render();
    };
  }
  const mealImgRemove=document.getElementById('mealImgRemove');
  if(mealImgRemove){
    mealImgRemove.onclick=e=>{
      e.stopPropagation();
      if(pendingMealFile)URL.revokeObjectURL(pendingMealFile);
      pendingMealFile=null;
      render();
    };
  }

  // Delete buttons
  document.querySelectorAll('[data-del-thought]').forEach(b=>{
    b.onclick=()=>{data.thoughts=data.thoughts.filter(t=>t.id!==b.dataset.delThought);save();render();};
  });
  document.querySelectorAll('[data-del-sleep]').forEach(b=>{
    b.onclick=()=>{data.body.sleep=data.body.sleep.filter(s=>s.id!==b.dataset.delSleep);save();render();};
  });
}

function bindMeActions(){
  document.querySelectorAll('[data-action]').forEach(el=>{
    el.onclick=()=>{
      const action=el.dataset.action;
      if(action==='export-json')exportData('json');
      if(action==='export-csv')exportData('csv');
      if(action==='import')importData();
      if(action==='clear')showClearDialog();
    };
  });
}

async function saveThought(text,file){
  const entry={id:uid(),text,imgIds:[],ts:Date.now()};
  if(file){
    const blob=new Blob([await file.arrayBuffer()],{type:file.type});
    await IMG.save(entry.id+'_0',blob);
    entry.imgIds.push(entry.id+'_0');
  }
  data.thoughts.push(entry);
  save();
}

async function saveMeal(text,file){
  const entry={id:uid(),text,meal:document.getElementById('mealType')?.value||'lunch',imgId:null,ts:Date.now()};
  if(file){
    const blob=new Blob([await file.arrayBuffer()],{type:file.type});
    await IMG.save(entry.id,blob);
    entry.imgId=entry.id;
  }
  data.body.meals.push(entry);
  save();
}

async function loadImg(el,imgId){
  const blob=await IMG.get(imgId);
  if(blob){
    const url=URL.createObjectURL(blob);
    el.src=url;
    el.onclick=()=>{document.getElementById('imgFullImg').src=url;document.getElementById('imgFull').classList.add('show');};
  }
}

function exportData(format){
  if(format==='csv'){exportCSV();return}
  const json=JSON.stringify(data,null,2);
  const blob=new Blob([json],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='daily_tracker_backup.json';a.click();
  toast('JSON 导出成功');
}

function exportCSV(){
  const esc=v=>{if(v==null)return'';const s=String(v);return /[",\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s};
  const BOM='﻿';
  const lines=[];

  lines.push('【记账记录】');
  lines.push(['ID','类型','金额','分类','备注','时间'].map(esc).join(','));
  data.finance.forEach(r=>{
    lines.push([r.id, r.type==='expense'?'支出':'收入', r.amount, r.cat, r.note||'', new Date(r.ts).toLocaleString('zh-CN')].map(esc).join(','));
  });

  lines.push('');lines.push('【想法记录】');
  lines.push(['ID','内容','图片数量','时间'].map(esc).join(','));
  data.thoughts.forEach(r=>{
    lines.push([r.id, r.text, r.imgIds?.length||0, new Date(r.ts).toLocaleString('zh-CN')].map(esc).join(','));
  });

  lines.push('');lines.push('【睡眠记录】');
  lines.push(['ID','时长(小时)','质量','时间'].map(esc).join(','));
  data.body.sleep.forEach(r=>{
    lines.push([r.id, r.hours, r.quality, new Date(r.ts).toLocaleString('zh-CN')].map(esc).join(','));
  });

  lines.push('');lines.push('【饮食记录】');
  lines.push(['ID','内容','餐次','有图片','时间'].map(esc).join(','));
  data.body.meals.forEach(r=>{
    lines.push([r.id, r.text, mealLabels[r.meal]||r.meal, r.imgId?'是':'否', new Date(r.ts).toLocaleString('zh-CN')].map(esc).join(','));
  });

  const csv=BOM+lines.join('\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='daily_tracker_export.csv';a.click();
  toast('Excel (CSV) 导出成功');
}

function importData(){
  const input=document.createElement('input');input.type='file';input.accept='.json';
  input.onchange=async e=>{
    const f=e.target.files[0];if(!f)return;
    try{
      const json=await f.text();
      const d=JSON.parse(json);
      if(!d.finance||!d.thoughts||!d.body){toast('文件格式不正确');return}
      data=d;save();render();toast('导入成功');
    }catch(e){toast('导入失败，文件格式错误')}
  };
  input.click();
}

function showClearDialog(){
  const d=document.getElementById('dialog');
  d.innerHTML=`<h3>确认清除？</h3><p>所有记录将被永久删除，无法恢复。建议先导出备份。</p><div class="btns"><button class="btn btn-outline" id="dlgCancel">取消</button><button class="btn btn-accent" id="dlgConfirm">确认清除</button></div>`;
  document.getElementById('overlay').classList.add('show');
  document.getElementById('dlgCancel').onclick=()=>document.getElementById('overlay').classList.remove('show');
  document.getElementById('dlgConfirm').onclick=()=>{
    data=DB.default();save();render();
    document.getElementById('overlay').classList.remove('show');
    toast('数据已清除');
  };
}

function escHtml(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}

// After render, load all images
const origRender=render;
render=function(){
  origRender();
  setTimeout(loadAllImgs,100);
};
async function loadAllImgs(){
  document.querySelectorAll('img[data-img]').forEach(async img=>{
    if(!img.src||img.src===window.location.href||img.src.endsWith('#'))await loadImg(img,img.dataset.img);
  });
}

// Init
render();
if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js');
</script>
</body>
</html>
